<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image and table</title>
</head>
<body>
    <img height="230" src="image.png" alt="doll image"><br>
    <table>
        <caption> General details </caption>
        <tr>
            <td> Name</td>
            <td> cost</td>
            <th> quantity</th>
        </tr>

        <tr>
            <td colspan="2">Mango</td>
            <td>2kg</td>
        </tr>

        <tr> 
            <td rowspan="2">Grapes</td>
            <td>400</td>
            <td> 5kg</td>
        </tr>
        <tr>
            <td> 100</td>
            <td> 3kg</td>
        </tr>
    </table>
    <ol type="I">
        <li>HELLO</li>
        <li>KEMCHO</li>
        <LI>MAJAMA</LI>
    </ol>

    <UL type="circle">
        <LI>hello</LI>
        <li>kemcho</li>
        <li>majama</li>
    </UL>
</body>
</html>
