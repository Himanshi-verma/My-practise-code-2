<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms- Lets do it</title>
</head>
<body>
    <h1> Form to apply in web development course - TA </h1>
    <form action="post">
        <div>
            <label for="username"> Enter your username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        
        </div>
        <div>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female"> Female</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male"> Male</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="checkbox">Select the subscribe button</label>
        </div>
        <div>
            <label for="comment">Enter your comment</label><br>
            <textarea id="comment" name="comment" rows="4" cols="60">Enter your text here...</textarea>
            
        </div>
        <div>
            <label for="fruits"> Select fruit</label>
            <select id="fruit" name="fruits">
                <option value="apple"> Apple</option>
                <option value="orange"> Orange</option>
                <option value="cherry"> Cherry</option>
            </select>
        </div>

    
    
    </form>    
</body>
</html>
