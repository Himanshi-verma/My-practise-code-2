<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <h1> FORM TO APPLY FOR A POST </h1>
    <form action="post">
        <div>
             <label for="username" > Enetr your name </label>
             <input type="text" id="username" name="username" placeholder="Enetr your username">
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male"> Male </label> 
            <input type="radio" id="female" name="gender" value="female">
            <label for="female"> Female </label> 
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe"> Subscribe the letterbox </label>
        
        </div>
        <div>
            <label for="comment">Enter your comment </label><br>
            <textarea type="comment" id="comment" rows="4" cols="50"> Enter your comment </textarea>
            
         </div>
         <div>
            <label for="position"> Select your position</label>
            <select name="position" id="position">
                <option value="HR"> HR </option>
                <option value="designer"> Designer </option>
                <option value="Developer"> Developer</option>
            </select>
         </div>

    </form>
    
</body>
</html>
